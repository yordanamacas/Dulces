<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snoopy Planner Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PANTALLA 1: BIENVENIDA -->
    <section id="pantalla-bienvenida" class="active">
        <div class="card-registro">
            <img src="imagenes/snoopy_ en el techo.jpg" alt="Snoopy" class="img-registro">
            <h1>Bienvenidos</h1>
            <button class="btn-principal" onclick="irARegistro()">Registrarse</button>
        </div>
    </section>

    <!-- PANTALLA 2: REGISTRO -->
    <section id="pantalla-registro">
        <div class="card-registro">
            <h2>Crea tu Perfil</h2>
            <input type="text" id="nombre-input" placeholder="Tu nombre">
            <input type="text" id="curso-input" placeholder="Tu curso (ej: 5to)">
            <button class="btn-principal" onclick="finalizarRegistro()">Siguiente</button>
        </div>
    </section>

    <!-- PANTALLA 3: EL HORARIO -->
    <section id="pantalla-horario">
        <div class="user-info" id="user-display">Usuario | Curso</div>

        <nav class="nav-dias">
            <button onclick="seleccionarDia('Lunes', 2)">Lun</button>
            <button onclick="seleccionarDia('Martes', 3)" class="active">Mar</button>
            <button onclick="seleccionarDia('Miercoles', 4)">Mie</button>
            <button onclick="seleccionarDia('Jueves', 5)">Jue</button>
            <button onclick="seleccionarDia('Viernes', 6)">Vie</button>
        </nav>

        <div class="card-blanca-grande">
            <div class="fecha-seccion">
                <div id="dia-num">2</div>
                <div id="mes-txt">MAYO</div> <!-- Corregido de MAY a MAYO -->
            </div>
            <div class="separador-negro"></div>
            <div class="snoopy-contenedor">
                <img src="imagenes/snooy_ estudiando.jpg" alt="Snoopy">
            </div>
            <div class="reloj-seccion" id="reloj">16:46</div>
        </div>

        <div id="lista-materias"></div>

        <button class="btn-flotante-add" onclick="nuevaAsignatura()">+</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
